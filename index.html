<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1117">
    <link rel="manifest" href="manifest.json">
    <title>Skye — Calm Through Every Storm</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --card: rgba(255,255,255,0.06); --border: 1px solid rgba(255,255,255,0.1);
            --text: #e8f0f8; --text-dim: #7a9ab4;
            /* 3-State Colors */
            --status-color: #1d9e75; /* Default Green */
            --safe: #1d9e75; --watch: #FFD100; --warn: #C0386A;
            --font-size: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: linear-gradient(to bottom, #0d1117, #050505); 
            color: var(--text); font-family: 'DM Sans', sans-serif;
            overscroll-behavior: none; min-height: 100dvh; overflow-x: hidden;
        }

        /* Animated Stars */
        #star-container { position: fixed; top: 0; left: 0; width: 100%; height: 50%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.2); } }

        .app-container { position: relative; z-index: 1; padding: 20px; padding-bottom: 100px; max-width: 430px; margin: 0 auto; }

        /* Location & Temp */
        .location-pill { display: inline-flex; align-items: center; background: var(--card); padding: 6px 12px; border-radius: 20px; border: var(--border); font-size: 13px; margin-bottom: 20px; }
        .dot { height: 6px; width: 6px; background: var(--status-color); border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px var(--status-color); }
        
        .temp-val { font-family: 'DM Serif Display', serif; font-size: 80px; line-height: 1; margin: 10px 0; }
        .condition { text-transform: uppercase; letter-spacing: 2px; font-size: 12px; color: var(--text-dim); }

        /* Safe Card */
        .status-card { background: rgba(29, 158, 117, 0.1); border: 1px solid var(--status-color); border-radius: 16px; padding: 20px; margin: 24px 0; text-align: left; position: relative; }
        
        /* 2x2 Grid */
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
        .tool-card { background: var(--card); border: var(--border); padding: 24px 16px; border-radius: 16px; text-align: center; transition: transform 0.2s; }
        .tool-card:active { transform: scale(0.95); }
        .tool-icon { font-size: 24px; margin-bottom: 8px; display: block; }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(13,17,23,0.95); backdrop-filter: blur(10px); border-top: var(--border); display: flex; justify-content: space-around; padding: 12px 0 env(safe-area-inset-bottom); z-index: 100; }
        .nav-btn { background: none; border: none; color: var(--text-dim); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: var(--safe); }

        /* Modals */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; padding: 30px; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="star-container"></div>

    <div class="app-container">
        <div class="location-pill">
            <span class="dot"></span> <span id="city-name">Locating...</span>
        </div>

        <div class="temp-val" id="current-temp">--°</div>
        <div class="condition" id="current-condition">Updating Weather...</div>

        <div class="status-card" id="main-status-card">
            <div style="font-weight: 700; color: var(--status-color); margin-bottom: 4px;">YOU ARE SAFE</div>
            <div style="font-size: 13px; color: var(--text-dim);" id="status-msg">The sky is clear. Skye is watching the radar for you.</div>
        </div>

        <div class="tools-grid">
            <div class="tool-card" onclick="openModal('breathe')">
                <span class="tool-icon">🌬</span>
                <div style="font-weight: 600;">Breathe</div>
            </div>
            <div class="tool-card" onclick="openModal('ground')">
                <span class="tool-icon">🌿</span>
                <div style="font-weight: 600;">Ground Me</div>
            </div>
            <div class="tool-card" onclick="openModal('explain')">
                <span class="tool-icon">❓</span>
                <div style="font-weight: 600;">Explain That</div>
            </div>
            <div class="tool-card" onclick="openModal('sounds')">
                <span class="tool-icon">🌧</span>
                <div style="font-weight: 600;">Rain Sounds</div>
            </div>
        </div>
    </div>

    <div id="modal-breathe" class="modal">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <h2 style="font-family: 'DM Serif Display';">Breathe</h2>
        <p>Follow the circle to slow your heart rate.</p>
        </div>

    <nav class="nav-bar">
        <button class="nav-btn active"><span>📍</span>Now</button>
        <button class="nav-btn"><span>📡</span>Radar</button>
        <button class="nav-btn"><span>🧘</span>Calm</button>
        <button class="nav-btn"><span>👤</span>Profile</button>
    </nav>

    <script>
        // 1. Create Animated Stars
        const container = document.getElementById('star-container');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            container.appendChild(star);
        }

        // 2. Navigation & Modals
        function openModal(id) { document.getElementById('modal-' + id).classList.add('active'); }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        // 3. Real Weather Logic (NWS API)
        async function updateWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://api.weather.gov/points/${pos.coords.latitude},${pos.coords.longitude}`);
                    const data = await res.json();
                    const forecastRes = await fetch(data.properties.forecastHourly);
                    const forecastData = await forecastRes.json();
                    
                    const now = forecastData.properties.periods[0];
                    document.getElementById('current-temp').innerText = now.temperature + '°';
                    document.getElementById('current-condition').innerText = now.shortForecast;
                    document.getElementById('city-name').innerText = data.properties.relativeLocation.properties.city;
                    
                    // Logic for 3-state system
                    checkAlerts(now.shortForecast);
                } catch (e) {
                    console.log("Weather update failed", e);
                }
            });
        }

        function checkAlerts(condition) {
            const root = document.documentElement;
            const card = document.getElementById('main-status-card');
            if (condition.toLowerCase().includes('tornado') || condition.toLowerCase().includes('severe')) {
                root.style.setProperty('--status-color', 'var(--warn)');
                card.style.background = 'rgba(192, 56, 106, 0.15)';
            } else if (condition.toLowerCase().includes('watch')) {
                root.style.setProperty('--status-color', 'var(--watch)');
                card.style.background = 'rgba(255, 209, 0, 0.15)';
            }
        }

        updateWeather();
        setInterval(updateWeather, 300000); // 5 min refresh

        // 4. Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
